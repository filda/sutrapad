name: Validate and Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/validate-and-deploy.yml"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: validate-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Validate App
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || 'local-dev-client-id.apps.googleusercontent.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Steps are ordered cheapest → most expensive so a failure aborts the
      # job at the earliest possible point. `npm run check` would do all of
      # this in one shot, but it doesn't fail-fast between sub-steps the way
      # GitHub Actions step-by-step execution does — and the smoke test in
      # particular is much more informative as a standalone failure (it
      # signals "createApp doesn't even start", not "some unit test broke").
      #
      #   1. lint        — ~70ms, catches typos / dead-code regressions
      #   2. typecheck   — ~2-5s, catches type drift after refactors
      #   3. smoke       — ~2-3s, end-to-end "createApp boots" canary
      #                    (regressions here include the microtask-loop
      #                    bug class, which manifests as a job timeout
      #                    via vitest's per-test 3s timeout)
      #   4. rest tests  — ~15s, the bulk unit suite
      #   5. build       — ~3s, final shape we ship to GitHub Pages
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test (createApp end-to-end)
        run: npm run test:smoke

      - name: Run unit suite
        run: npm run test:unit

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment environment
        run: |
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then
            echo "Missing repository variable VITE_GOOGLE_CLIENT_ID"
            exit 1
          fi

      - name: Build app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
