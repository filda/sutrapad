name: Validate and Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/validate-and-deploy.yml"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: validate-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Validate App
    runs-on: ubuntu-latest
    env:
      # Real client ID drives the main-branch build that becomes the deployed
      # artifact; the fallback keeps PR / fork builds green when `vars` isn't
      # available to them. The "Validate deployment environment" step below
      # guards against an artifact accidentally being built with the fallback
      # and then promoted to production.
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || 'local-dev-client-id.apps.googleusercontent.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Steps are ordered cheapest → most expensive so a failure aborts the
      # job at the earliest possible point. `npm run check` would do all of
      # this in one shot, but it doesn't fail-fast between sub-steps the way
      # GitHub Actions step-by-step execution does — and the smoke test in
      # particular is much more informative as a standalone failure (it
      # signals "createApp doesn't even start", not "some unit test broke").
      #
      #   1. lint        — ~70ms, catches typos / dead-code regressions
      #   2. typecheck   — ~2-5s, catches type drift after refactors
      #   3. smoke       — ~2-3s, end-to-end "createApp boots" canary
      #                    (regressions here include the microtask-loop
      #                    bug class, which manifests as a job timeout
      #                    via vitest's per-test 3s timeout)
      #   4. rest tests  — ~15s, the bulk unit suite
      #   5. build       — ~3s, final shape we ship to GitHub Pages
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test (createApp end-to-end)
        run: npm run test:smoke

      - name: Run unit suite
        run: npm run test:unit

      # Guard the deployable build *before* it bakes the (missing) client ID
      # into the artifact. PR / fork builds are allowed to fall back so that
      # contributors without access to repo `vars` still get a green check.
      # The condition mirrors the deploy job's `if` so a workflow_dispatch
      # rerun on main goes through the same validation path as a push.
      - name: Validate deployment environment
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ vars.VITE_GOOGLE_CLIENT_ID }}" ]; then
            echo "Missing repository variable VITE_GOOGLE_CLIENT_ID"
            exit 1
          fi

      - name: Build
        run: npm run build

      # Only main-branch runs produce an artifact for the deploy job to
      # publish. PR / fork runs build purely to verify the build still works.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # No checkout / setup-node / npm ci / build here — `actions/deploy-pages`
      # picks up the artifact uploaded by the `checks` job and publishes it
      # directly. The whole job is just the deployment handshake.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
